name: Build Speed Mod (Fabric 1.21.4)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.8   # Явно указываем версию Gradle

      - name: Build mod
        run: gradle clean build   # Используем 'gradle', а не './gradlew'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: speed-mod-fabric-1.21.4
          path: build/libs/*.jar
